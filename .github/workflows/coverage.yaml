name: coverage
permissions:
  # needs write as soon as it creates releases
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'src-tauri/**'
  pull_request:
    paths:
      - 'src-tauri/**'

env:
  RUST_BACKTRACE: 1

concurrency:
   group: ${{ github.workflow }}-${{ github.ref }}
   cancel-in-progress: true

jobs:  
  coverage:
    runs-on: ubuntu-22.04
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v5

      - name: Install and cache APT packages
        uses: gerlero/apt-install@v1.3.11
        with:
          # APT packages to install
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: cache libheif build
        id: cache-libheif
        uses: actions/cache@v4
        with:
          path: /usr/local
          key: libheif-1.21.2-${{ runner.os }}-${{ runner.arch }}

      - name: compile libheif
        if: ${{ steps.cache-libheif.outputs.cache-hit != 'true' }}
        run: |
          sudo apt-get install -y cmake libde265-dev libx265-dev libjpeg-dev libpng-dev
          # Ubuntu apt repos only have libheif 1.12-1.17; libheif-rs 2.7.0 requires >= 1.21
          LIBHEIF_VERSION=1.21.2
          wget -q "https://github.com/strukturag/libheif/releases/download/v${LIBHEIF_VERSION}/libheif-${LIBHEIF_VERSION}.tar.gz"
          tar -xzf "libheif-${LIBHEIF_VERSION}.tar.gz"
          cd "libheif-${LIBHEIF_VERSION}"
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DWITH_EXAMPLES=OFF -DWITH_TESTS=OFF .
          make -j$(nproc)
          sudo make install

      - name: register libheif
        run: sudo ldconfig

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Rust environment
        uses: dtolnay/rust-toolchain@1.93.0

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate code coverage
        run: cd src-tauri && cargo llvm-cov --all-features --workspace --lcov --output-path target/lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # required for private repos or protected branches
          files: src-tauri/target/lcov.info
          fail_ci_if_error: true
