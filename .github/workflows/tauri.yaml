name: 'tauri'

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # for Arm based macs (M1 and above).
            arch: 'aarch64'
            args: '--target aarch64-apple-darwin'
            pkgConfigPath: '/opt/homebrew/lib/pkgconfig'
          - platform: 'macos-15-intel'
            arch: 'x86_64'
            args: '--target x86_64-apple-darwin'
            pkgConfigPath: '/usr/local/lib/pkgconfig'

          - platform: 'ubuntu-22.04'
            arch: 'amd64'
            args: ''
            pkgConfigPath: '/usr/lib/x86_64-linux-gnu/pkgconfig'

          - platform: 'ubuntu-22.04-arm' # Only available in public repos.
            arch: 'arm64'
            args: ''
            pkgConfigPath: '/usr/lib/aarch64-linux-gnu/pkgconfig'
            
          - platform: 'windows-latest'
            arch: 'x64'
            args: ''
            pkgConfigPath: 'C:\vcpkg\installed\x64-windows\lib\pkgconfig'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install libheif (macOS only)
        if: ${{ startsWith(matrix.platform, 'macos') }}
        run: |
          brew install libheif dylibbundler

      - name: install libheif1 (ubuntu only)
        if: ${{ startsWith(matrix.platform, 'ubuntu') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils libheif-dev

      - name: install libheif (windows only)
        if: ${{ startsWith(matrix.platform, 'windows') }}
        run: |
          vcpkg install libheif

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
#          cache: 'yarn' # Set this to npm, yarn or pnpm.

      - name: setup bun
        uses: oven-sh/setup-bun@v2

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable # Set this to dtolnay/rust-toolchain@nightly
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: ${{ matrix.platform }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: install frontend dependencies
        # If you don't have `beforeBuildCommand` configured you may want to build your frontend here too.
        run: bun install # change this to npm or pnpm depending on which one you use.

      - name: build and create release candidate
        uses: tauri-apps/tauri-action@v0
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          PKG_CONFIG_PATH: ${{ matrix.pkgConfigPath }}
        with:
          tagName: v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: 'v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          assetNamePattern: "[platform]-[arch]-[name]-[version][ext]"
          args: ${{ matrix.args }} --features libheif

      - name: build and provide workflow artifacts
        uses: tauri-apps/tauri-action@v0
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG_CONFIG_PATH: ${{ matrix.pkgConfigPath }}
        with:
          assetNamePattern: "[platform]-[arch]-[name]-[version][ext]"
          # will be released in 1.0.0
          #uploadWorkflowArtifacts: true
          args: ${{ matrix.args }} --features libheif --no-sign

      - name: bundle macOS dylibs into .app
        if: ${{ startsWith(matrix.platform, 'macos') }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -e

          # Locate the bundle dir — path varies with --target flag
          TARGET=$(echo "${{ matrix.args }}" | grep -oE '[a-z0-9_]+-apple-darwin' | head -1)
          if [ -n "$TARGET" ]; then
            BUNDLE_DIR="src-tauri/target/$TARGET/release/bundle/macos"
          else
            BUNDLE_DIR="src-tauri/target/release/bundle/macos"
          fi

          APP=$(find "$BUNDLE_DIR" -maxdepth 1 -name "*.app" | head -1)
          echo "Patching: $APP"

          # The main binary inside the .app
          APP_BIN_NAME=$(ls "$APP/Contents/MacOS/" | head -1)
          APP_BINARY="$APP/Contents/MacOS/$APP_BIN_NAME"
          FRAMEWORKS="$APP/Contents/Frameworks"
          mkdir -p "$FRAMEWORKS"

          # Walk the full libheif dependency tree and copy everything into Frameworks/
          dylibbundler -od -b \
            -x "$APP_BINARY" \
            -d "$FRAMEWORKS" \
            -p "@executable_path/../Frameworks/"

          echo "Bundled frameworks:"
          ls "$FRAMEWORKS"

          # Recreate the updater .tar.gz with the now-patched .app
          APP_NAME=$(basename "$APP")
          TAR_FILE="${APP_NAME%.app}.app.tar.gz"
          cd "$BUNDLE_DIR"
          tar czf "$TAR_FILE" "$APP_NAME"

          # Re-sign the new archive with the Tauri updater key (if present)
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            cd "$GITHUB_WORKSPACE"
            bunx tauri signer sign \
              "$BUNDLE_DIR/$TAR_FILE" \
              --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
              --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
          fi

          # Rebuild the DMG from the patched .app
          cd "$BUNDLE_DIR"
          DMG=$(ls *.dmg 2>/dev/null | head -1)
          if [ -n "$DMG" ]; then
            VOLNAME="${APP_NAME%.app}"
            rm "$DMG"
            hdiutil create -volname "$VOLNAME" -srcfolder "$APP_NAME" -ov -format UDZO "$DMG"
          fi

          # Re-sign the new archive with the Tauri updater key (if present)
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            cd "$GITHUB_WORKSPACE"
            bunx tauri signer sign \
              "$BUNDLE_DIR/$DMG" \
              --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
              --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
          fi

      - name: Upload macOS bundle artifacts
        uses: actions/upload-artifact@v6
        if: ${{ startsWith(matrix.platform, 'macos') && github.event_name == 'pull_request' }}
        with:
          name: tauri-bundles-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            src-tauri/target/**/release/bundle/macos/media-viewer.app.tar.gz
            src-tauri/target/**/release/bundle/macos/media-viewer.app.tar.gz.sig
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/dmg/*.dmg.sig

      - name: Upload Windows bundle artifacts
        uses: actions/upload-artifact@v6
        if: ${{ startsWith(matrix.platform, 'windows') && github.event_name == 'pull_request' }}
        with:
          name: tauri-bundles-${{ matrix.platform }}
          path: |
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/msi/*.msi.sig
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/nsis/*.exe.sig

      - name: Upload Linux bundle artifacts
        uses: actions/upload-artifact@v6
        if: ${{ startsWith(matrix.platform, 'ubuntu') && github.event_name == 'pull_request' }}
        with:
          name: tauri-bundles-${{ matrix.platform }}
          path: |
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/deb/*.deb.sig
            src-tauri/target/**/release/bundle/rpm/*.rpm
            src-tauri/target/**/release/bundle/rpm/*.rpm.sig
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/appimage/*.AppImage.sig
